services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_URL: "http://localhost:8080"
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root -p"${DB_ROOT_PASSWORD}"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  storage_data:
