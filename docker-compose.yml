services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mbealexportfolio
      DB_USERNAME: mbealex
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/up || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    image: ${APP_IMAGE:-mbealexportfolio-app}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mbealexportfolio
      DB_USERNAME: mbealex
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    command: php artisan queue:listen --tries=3 --timeout=300

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: mbealexportfolio
      MYSQL_USER: mbealex
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root -p"${DB_ROOT_PASSWORD}"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  storage_data:
